name: LCK Schedule Auto Update

on:
  schedule:
    - cron: '0 18 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    # [추가] 강제로 Node.js 24 환경을 사용하도록 설정
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
      - uses: actions/checkout@v4 
      
      - name: 파이썬 설정
        uses: actions/setup-python@v5 
        with:
          python-version: '3.11'

      - name: 라이브러리 설치
        run: pip install -r requirements.txt

      - name: 크롤러 실행
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: python lck_crawler.py
