name: LCK Schedule Auto Update

on:
  schedule:
    - cron: '0 18 * * *' # 매일 한국 시간 새벽 3시에 자동 실행
  workflow_dispatch: # 수동 실행 버튼 활성화

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # v3에서 v4로 업데이트
      - uses: actions/checkout@v4 

      # v4에서 v5로 업데이트
      - name: 파이썬 설정
        uses: actions/setup-python@v5 
        with:
          python-version: '3.11' # 최신 파이썬 버전 권장

      - name: 라이브러리 설치
        run: pip install -r requirements.txt

      - name: 크롤러 실행
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: python lck_crawler.py
